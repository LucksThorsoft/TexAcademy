
{% extends 'sidebar.html' %}

{% block header_title %}Direccion{% endblock %}

{% block content %}

<div class="botons-header">
    <button class="btn-primary" id="btnNuevoDocente">
        <span class="mdi mdi-plus"></span>
        Nuevo Docente
    </button>

    <button class="btn-secondary">
        <span class="mdi mdi-plus"></span>
        Nuevo Grupo
    </button>
</div>

<!-- MODAL -->
<div class="modal" id="modalDocente">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Nuevo Docente</h3>
            <span class="modal-close" id="closeModal">&times;</span>
        </div>

        <div class="modal-body">
            <input type="text" name="nombre" id="" placeholder="Nombre del Docente">
        </div>

        <div class="modal-footer">
            <button class="btn-secondary" id="cancelarModal">Cancelar</button>
            <button class="btn-primary">Guardar</button>
        </div>
    </div>
</div>

<script>
    const btnNuevoDocente = document.getElementById("btnNuevoDocente");
    const modalDocente = document.getElementById("modalDocente");
    const closeModal = document.getElementById("closeModal");
    const cancelarModal = document.getElementById("cancelarModal");

    btnNuevoDocente.addEventListener("click", () => {
        modalDocente.style.display = "flex";
    });

    closeModal.addEventListener("click", () => {
        modalDocente.style.display = "none";
    });

    cancelarModal.addEventListener("click", () => {
        modalDocente.style.display = "none";
    });

    // Cerrar al hacer click fuera
    window.addEventListener("click", (e) => {
        if (e.target === modalDocente) {
            modalDocente.style.display = "none";
        }
    });
</script>
    
{% endblock %}


{% block extra_css %}
<style>
.botons-header {
    display: flex;
    gap: 12px;
}

.botons-header button {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-primary {
    background-color: #0d6efd;
    color: white;
}

.btn-primary:hover {
    background-color: #0b5ed7;
}

.btn-secondary {
    background-color: #198754;
    color: white;
}

.btn-secondary:hover {
    background-color: #157347;
}

.mdi {
    font-size: 18px;
}

/* FONDO DEL MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

/* CONTENIDO */
.modal-content {
    background: #fff;
    width: 400px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    animation: fadeIn 0.25s ease;
}

/* HEADER */
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
}

.modal-header h3 {
    margin: 0;
    font-size: 18px;
}

.modal-close {
    font-size: 22px;
    cursor: pointer;
}

/* BODY */
.modal-body {
    padding: 16px;
}

/* FOOTER */
.modal-footer {
    padding: 14px 16px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    border-top: 1px solid #eee;
}

/* ANIMACIÓN */
@keyframes fadeIn {
    from {
        transform: translateY(-10px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

</style>
{% endblock %}
