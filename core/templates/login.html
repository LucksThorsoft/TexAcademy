<!DOCTYPE html>
{% load static %}
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen | Academic Management Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#135bec",
              "background-light": "#f6f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Lexend", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#111318] dark:text-white transition-colors duration-300">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<main class="flex flex-1 items-center justify-center p-6 relative">
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[30%] bg-primary/40 rounded-full blur-[100px]"></div>
</div>
<div class="layout-content-container flex flex-col w-full max-w-[480px] bg-white dark:bg-slate-900 shadow-2xl rounded-xl p-8 z-10 border border-[#dbdfe6] dark:border-gray-800">
<div class="flex flex-col items-center pb-8">
<div class="bg-primary/10 p-3 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-4xl">school</span>
</div>
<h1 class="text-[#111318] dark:text-white tracking-light text-[32px] font-bold leading-tight text-center">Bienvenido</h1>
<p class="text-[#616f89] dark:text-gray-400 text-base font-normal leading-normal text-center mt-2">Ingresa tus credenciales para acceder</p>
</div>

{% if messages %}
    {% for message in messages %}
    <div class="mb-6 p-4 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 flex items-center gap-3">
        <span class="material-symbols-outlined text-red-600 dark:text-red-400">error</span>
        <p class="text-red-800 dark:text-red-200 text-sm font-medium">{{ message }}</p>
    </div>
    {% endfor %}
{% endif %}

<form class="space-y-4" method="POST" action="{% url 'login' %}">
    {% csrf_token %} <div class="flex flex-col w-full">
<label class="flex flex-col">
<p class="text-[#111318] dark:text-gray-200 text-sm font-semibold leading-normal pb-2">Correo Institucional</p>
<input name="correo" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-[#616f89] p-[15px] text-base font-normal leading-normal" placeholder="correo@institucion.edu" type="email" required/>
</label>
</div>
<div class="flex flex-col w-full">
<div class="flex justify-between items-center pb-2">
<p class="text-[#111318] dark:text-gray-200 text-sm font-semibold leading-normal">Contraseña</p>
</div>
<label class="flex flex-col">
<div class="flex w-full flex-1 items-stretch rounded-lg shadow-sm">
<input id="passwordInput" name="password" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-[#616f89] p-[15px] rounded-r-none border-r-0 text-base font-normal leading-normal" placeholder="Ingresa tu contraseña" type="password" required/>
<div onclick="togglePassword()" class="text-[#616f89] flex border border-[#dbdfe6] dark:border-gray-700 bg-white dark:bg-slate-800 items-center justify-center px-4 rounded-r-lg border-l-0 cursor-pointer hover:text-primary select-none">
<span class="material-symbols-outlined" id="eyeIcon">visibility</span>
</div>
</div>
</label>
</div>
<div class="pt-4">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
<span class="truncate">Iniciar Sesion</span>
</button>
</div>
</form>
</div>
</main>
<footer class="px-10 py-6 text-center text-[#616f89] dark:text-gray-500 text-sm">
<p>© 2026 TexAcademy System. All rights reserved.</p>
</footer>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('passwordInput');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerText = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerText = 'visibility';
        }
    }
</script>
</body></html>
